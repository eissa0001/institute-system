<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
</head>
<body>

<h2>تسجيل الحضور</h2>

<form method="post">
    {% csrf_token %}

    <table border="1">
        <tr>
            <th>الطالب</th>
            <th>الحالة</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>
                <select name="status_{{ student.id }}">
                    <option value="present">حاضر</option>
                    <option value="absent">غائب</option>
                    <option value="late">متأخر</option>
                    <option value="excused">استئذان</option>
                </select>
            </td>
        </tr>
        {% endfor %}

    </table>

    <button type="submit">حفظ</button>

</form>

</body>
</html>
